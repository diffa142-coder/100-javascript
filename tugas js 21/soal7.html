<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const a = 8.3;
        const c = '3.2';

        document.write(`${a} + ${parseFloat(c)} = ${(a + parseFloat(a))}<br>`)
        document.write(`${a} - ${parseFloat(c)} = ${(a - parseFloat(a)).toFixed(1)}<br>`)
        document.write(`${a} * ${parseFloat(c)} = ${(a * parseFloat(a)).toFixed(2)}<br>`)
        document.write(`${a} / ${parseFloat(c)} = ${(a / parseFloat(a))}<br>`)
        document.write(`${a} % ${parseFloat(c)} = ${(a % parseFloat(a)).toFixed()}`)

        console.log(`${a} + ${parseFloat(c)} = ${(a + parseFloat(a))}<br>`)
        console.log(`${a} - ${parseFloat(c)} = ${(a - parseFloat(a)).toFixed(1)}<br>`)
        console.log(`${a} * ${parseFloat(c)} = ${(a * parseFloat(a)).toFixed(2)}<br>`)
        console.log(`${a} / ${parseFloat(c)} = ${(a / parseFloat(a))}<br>`)
        console.log(`${a} % ${parseFloat(c)} = ${(a % parseFloat(a)).toFixed()}`) 
    </script>
</body>
</html>
